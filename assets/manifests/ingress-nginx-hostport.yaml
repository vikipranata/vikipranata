  namespace: ingress-nginx-hostport
spec:
  externalTrafficPolicy: Local
  internalTrafficPolicy: Cluster
  ipFamilies:
  - IPv4
  ipFamilyPolicy: SingleStack
  ports:
  - appProtocol: http
    name: http
    nodePort: 30080
    port: 80
    protocol: TCP
    targetPort: http
  - appProtocol: https
    name: https
    nodePort: 30443
    port: 443
    protocol: TCP
    targetPort: https
  selector:
    app.kubernetes.io/component: controller-ingress-nginx
    app.kubernetes.io/instance: ingress-nginx-hostport
  sessionAffinity: None
  type: LoadBalancer
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: ingress-nginx-hostport-controller
  namespace: ingress-nginx-hostport
  labels:
    service-app: ingress-nginx-hostport
    app.kubernetes.io/component: controller-ingress-nginx
    app.kubernetes.io/instance: ingress-nginx-hostport
    app.kubernetes.io/part-of: ingress-nginx-hostport
    app.kubernetes.io/version: 1.9.6
spec:
  selector:
    matchLabels:
      app.kubernetes.io/component: controller-ingress-nginx
      app.kubernetes.io/instance: ingress-nginx-hostport
      app.kubernetes.io/name: ingress-nginx-hostport
  template:
    metadata:
      labels:
        app.kubernetes.io/component: controller-ingress-nginx
        app.kubernetes.io/instance: ingress-nginx-hostport
        app.kubernetes.io/name: ingress-nginx-hostport
        app.kubernetes.io/part-of: ingress-nginx-hostport
        app.kubernetes.io/version: 1.9.6
      annotations:
        prometheus.io/port: "10254"
        prometheus.io/scrape: "true"
    spec:
      serviceAccountName: ingress-nginx-hostport
      terminationGracePeriodSeconds: 300
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      # nodeSelector:
      #   node-role.kubernetes.io/ingress: 'true'
      # tolerations:
      #     - key: node-role.kubernetes.io/ingress
      #       value: "true"
      #       effect: "NoSchedule"
      #       operator: "Equal"
      priorityClassName: ingress-nginx-hostport-cluster-ciritical
      containers:
        - args:
            - /nginx-ingress-controller
            - --election-id=ingress-nginx-hostport-leader
            - --controller-class=k8s.io/ingress-nginx-hostport
            - --ingress-class=nginx-hostport
            - --configmap=$(POD_NAMESPACE)/ingress-nginx-hostport-controller
            - --validating-webhook=:8443
            - --validating-webhook-certificate=/usr/local/certificates/cert
            - --validating-webhook-key=/usr/local/certificates/key
            - --tcp-services-configmap=$(POD_NAMESPACE)/tcp-services
            - --udp-services-configmap=$(POD_NAMESPACE)/udp-services
            - --annotations-prefix=nginx.ingress.kubernetes.io
            - --report-node-internal-ip-address
            - --http-port=80
            - --https-port=443
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: LD_PRELOAD
              value: /usr/local/lib/libmimalloc.so
          name: controller
          image: registry.k8s.io/ingress-nginx/controller:v1.11.1@sha256:e6439a12b52076965928e83b7b56aae6731231677b01e81818bce7fa5c60161a
          imagePullPolicy: IfNotPresent
          lifecycle:
            preStop:
              exec:
                command:
                  - /wait-shutdown
          ports:
          - containerPort: 80
            name: http
            protocol: TCP
          - containerPort: 443
            name: https
            protocol: TCP
          - containerPort: 8443
            name: webhook
            protocol: TCP
          - name: metrics
            containerPort: 10254
          livenessProbe:
            httpGet:
              path: /healthz
              port: 10254
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: 10254
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 3
          securityContext:
            capabilities:
                drop:
                  - ALL
                add:
                  - NET_BIND_SERVICE
            # www-data -> 101
            runAsUser: 101
            allowPrivilegeEscalation: true
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
          - mountPath: /usr/local/certificates/
            name: webhook-cert
            readOnly: true
      volumes:
      - name: webhook-cert
        secret:
          secretName: ingress-nginx-hostport-admission
---
apiVersion: batch/v1
kind: Job
metadata:
  labels:
    service-app: ingress-nginx-hostport
