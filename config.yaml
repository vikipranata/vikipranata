baseURL: "https://www.tworty.id"
title: "Viki Pranata"
paginate: 5
theme: PaperMod

googleAnalytics: G-FY6EQ643W7
enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false
enableInlineShortcodes: true

minify:
  disableXML: true
  minifyOutput: true

params:
  env: production
  title: Viki Pranata
  description: "This is my journal"
  keywords: [Blog, Portfolio, Technology, SysAdmin, SysOps]
  author: Me
  images: "assets/images/profile.jpg"
  defaultTheme: dark
  disableThemeToggle: false
  TocOpen: true
  ShowReadingTime: true
  ShowShareButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowWordCount: true
  ShowRssButtonInSectionTermList: true
  UseHugoToc: true
  disableSpecial1stPost: false
  disableScrollToTop: false
  comments: true
  hidemeta: false
  hideSummary: false
  showtoc: false
  tocopen: false
  enableEmoji : true
  assets:
    # disableHLJS: true
    # disableFingerprinting: true
    favicon: "assets/images/panda.webp"
    favicon16x16: "assets/images/panda.webp"
    favicon32x32: "assets/images/panda.webp"
    apple_touch_icon: "assets/images/panda.webp"
    safari_pinned_tab: "assets/images/panda.webp"

  label:
    text: "Home"
    icon: assets/images/panda.webp
    iconHeight: 20

  profileMode:
      enabled: true
      title: "Viki Pranata"
      subtitle: "Hai, kenal lebih dekat dengan saya, klik tautan dibawah ini. 👋"
      imageUrl: "assets/images/profile.jpg"
      imageTitle: "me"
      imageWidth: 200
      imageHeight: 200

  homeInfoParams:
    Title: "Halo, selamat datang \U0001F642"
    Content: "Hai, kenal lebih dekat dengan saya, klik tautan dibawah ini. 👋"

  socialIcons:
    - name: email
      url: "mailto:helovikipranata@gmail.com"
    - name: telegram
      url: "https://t.me/vikipranata"
    - name: instagram
      url: "https://instagram.com/vikipranata"
    - name: twitter
      url: "https://twitter.com/vikipranata"
    - name: credly
      url: "https://www.credly.com/users/vikipranata"
    - name: github
      url: "https://github.com/vikipranata"
    - name: linkedin
      url: "https://www.linkedin.com/in/vikipranata"

  cover:
    hidden: true
    hiddenInList: true
    hiddenInSingle: true

  editPost:
    URL: "https://github.com/vikipranata/vikipranata/blob/main/content"
    Text: "Suggest Changes"
    appendFilePath: true

  # for search
  # https://fusejs.io/api/options.html
  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    keys: ["title", "permalink", "summary", "content", "tags"]

outputs:
  home:
    - HTML
    - RSS
    - JSON # is necessary

menu:
  main:
    - identifier: About
      name: About
      url: /about/
      weight: 10
    - identifier: Archives
      name: Archives
      url: /archives/
      weight: 10
    - identifier: Blogs
      name: Blogs
      url: /blogs/
      weight: 10
    - identifier: Search
      name: Search
      url: /search/
      weight: 10

pygmentsUseClasses: true
markup:
  highlight:
    # noClasses: false
    # anchorLineNos: true
    codeFences: true
    guessSyntax: true
    lineNos: true
    style: monokai
